services:

  # ── Infrastructure ────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: intellidocs-postgres
    environment:
      POSTGRES_DB: intellidocs
      POSTGRES_USER: intellidocs
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellidocs -d intellidocs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-net
    restart: unless-stopped

  elasticsearch:
    build:
      context: ./infra/elasticsearch
      dockerfile: Dockerfile
    container_name: intellidocs-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - intellidocs-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: intellidocs-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - intellidocs-net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: intellidocs-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 300m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: intellidocs-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: intellidocs
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_DEFAULT_VHOST: intellidocs
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - intellidocs-net
    restart: unless-stopped

  # ── Application ───────────────────────────

  parser:
    build:
      context: ./parsing-service
      dockerfile: Dockerfile
    container_name: intellidocs-parser
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: intellidocs
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: intellidocs
      API_CALLBACK_URL: http://api:8080
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads_data:/data/uploads
    deploy:
      resources:
        limits:
          memory: 512m
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - intellidocs-net
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intellidocs-api
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      ES_HOST: elasticsearch
      QDRANT_HOST: qdrant
      UPLOAD_DIR: /data/uploads
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      EXTERNAL_URL: ${EXTERNAL_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-min-256-bits-required-here}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PARSING_SERVICE_URL: http://parser:8000
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - uploads_data:/data/uploads
    deploy:
      resources:
        limits:
          memory: 768m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - intellidocs-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${EXTERNAL_URL:-http://localhost}/api/v1
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: intellidocs-frontend
    environment:
      API_URL: http://api:8080
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      api:
        condition: service_healthy
    networks:
      - intellidocs-net
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: intellidocs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 64m
    depends_on:
      - frontend
      - api
    networks:
      - intellidocs-net
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: intellidocs-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - intellidocs-net

volumes:
  postgres_data:
  elasticsearch_data:
  qdrant_data:
  redis_data:
  rabbitmq_data:
  uploads_data:
  certbot_www:
  certbot_certs:

networks:
  intellidocs-net:
    driver: bridge
