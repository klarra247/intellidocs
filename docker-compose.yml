services:

  # ─────────────────────────────────────────
  # 🟢 Spring Boot — Main API Server
  # ─────────────────────────────────────────
  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: intellidocs-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/intellidocs
      SPRING_DATASOURCE_USERNAME: intellidocs
      SPRING_DATASOURCE_PASSWORD: intellidocs_secret
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: intellidocs
      SPRING_RABBITMQ_PASSWORD: intellidocs_secret
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      PARSING_SERVICE_URL: http://parser:8000
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - intellidocs-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 🐍 Python FastAPI — Parsing Service
  # ─────────────────────────────────────────
  parser:
    build:
      context: ./backend/parser
      dockerfile: Dockerfile
    container_name: intellidocs-parser
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: intellidocs
      RABBITMQ_PASSWORD: intellidocs_secret
      API_CALLBACK_URL: http://api:8080
      EMBEDDING_API_KEY: ${LLM_API_KEY}
      EMBEDDING_PROVIDER: ${LLM_PROVIDER:-anthropic}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - intellidocs-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # ⚛️  Next.js — Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intellidocs-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api
    networks:
      - intellidocs-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 🐘 PostgreSQL — 메타데이터 저장
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: intellidocs-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: intellidocs
      POSTGRES_USER: intellidocs
      POSTGRES_PASSWORD: intellidocs_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellidocs -d intellidocs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 🔎 Elasticsearch — 키워드 검색 (BM25)
  # ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: intellidocs-elasticsearch
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      xpack.security.enabled: false          # 로컬 개발용 — 프로덕션에서는 true로
      xpack.security.http.ssl.enabled: false
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"     # 메모리 제한 (로컬 개발용)
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - intellidocs-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 🧠 Qdrant — Vector DB (의미 검색)
  # ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: intellidocs-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - intellidocs-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # ⚡ Redis — 캐싱 + 세션
  # ─────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: intellidocs-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass intellidocs_secret --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "intellidocs_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # 📨 RabbitMQ — 파싱 작업 비동기 큐
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: intellidocs-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 관리 UI (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: intellidocs
      RABBITMQ_DEFAULT_PASS: intellidocs_secret
      RABBITMQ_DEFAULT_VHOST: intellidocs
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - intellidocs-net
    restart: unless-stopped

# ─────────────────────────────────────────
# 📦 Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  elasticsearch_data:
  qdrant_data:
  redis_data:
  rabbitmq_data:

# ─────────────────────────────────────────
# 🌐 Network
# ─────────────────────────────────────────
networks:
  intellidocs-net:
    driver: bridge
