spring:
  application:
    name: intellidocs-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # === Database (PostgreSQL) ===
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:intellidocs}
    username: ${DB_USERNAME:intellidocs}
    password: ${DB_PASSWORD:intellidocs_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # === Redis ===
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:intellidocs_secret}
      timeout: 5000

  # === RabbitMQ ===
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:intellidocs}
    password: ${RABBITMQ_PASSWORD:intellidocs_secret}
    virtual-host: ${RABBITMQ_VHOST:intellidocs}

  # === File Upload ===
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # === Jackson ===
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# === Server ===
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

# === Actuator ===
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# === Application Custom Properties ===
app:
  # Elasticsearch
  elasticsearch:
    host: ${ES_HOST:localhost}
    port: ${ES_PORT:9200}
    index-name: document_chunks

  # Qdrant
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_GRPC_PORT:6334}
    collection-name: document_chunks

  # Parsing Service (Python FastAPI)
  parsing-service:
    url: ${PARSING_SERVICE_URL:http://localhost:8000}

  # LLM
  llm:
    provider: ${LLM_PROVIDER:anthropic}  # anthropic or openai
    max-context-tokens: ${LLM_MAX_CONTEXT_TOKENS:8000}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-sonnet-4-20250514}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o}
    voyage:
      api-key: ${VOYAGE_API_KEY:pa-hYNHRtocHB2VOIUBuZiRK5eNxTP671zQSDYDj0-7bPu}
      model: ${EMBEDDING_MODEL:voyage-3.5-lite}

  # Hybrid Search
  search:
    vector-weight: ${SEARCH_VECTOR_WEIGHT:0.6}
    bm25-weight: ${SEARCH_BM25_WEIGHT:0.4}
    rrf-k: ${SEARCH_RRF_K:60}
    default-limit: ${SEARCH_DEFAULT_LIMIT:10}

  # JWT
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-in-production-min-256-bits-required-here}
    expiration-ms: ${JWT_EXPIRATION:86400000}  # 24 hours

  # File Storage
  storage:
    upload-dir: ${UPLOAD_DIR:/tmp/intellidocs/uploads}

# === Logging ===
logging:
  level:
    com.intellidocs: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# === Local Profile ===
spring:
  config:
    activate:
      on-profile: local

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

---
# === Production Profile ===
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    com.intellidocs: INFO
    org.hibernate.SQL: WARN